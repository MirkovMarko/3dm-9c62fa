  .card .val { font-size:21px; font-weight:700; margin-top:4px; }

  .today .t .v { font-size:18px; font-weight:700; margin-top:2px; }

  th,td { text-align:left; padding:8px; border-bottom:1px solid #eef0f4; vertical-align:top; }

  td.num,th.num { text-align:right; white-space:nowrap; }
  td.nowrap,th.nowrap { white-space:nowrap; }
  .col-proizvod { min-width:230px; }
  .tableScroll { max-height:560px; overflow:auto; -webkit-overflow-scrolling:touch; }
  .badge { font-size:11px; padding:3px 8px; border-radius:999px; font-weight:600; display:inline-block; white-space:nowrap; }
  .pos { color:#0f8a4d; font-weight:600; }
  .neg { color:#c4332b; font-weight:600; }
  .muted { color:#9aa1ad; }
  .twocol { display:grid; grid-template-columns:1fr; gap:14px; }

  .chartBox { position:relative; height:300px; }
  .center { padding:36px 16px; text-align:center; color:#6b7280; }
  .err { color:#c4332b; }
  .formrow { display:flex; flex-wrap:wrap; gap:8px; align-items:flex-end; margin-bottom:12px; }
  .formrow .f { display:flex; flex-direction:column; gap:3px; }
  .formrow label { font-size:11px; color:#7a8294; }
  .formrow input { padding:8px; border:1px solid #cfd3db; border-radius:8px; font-size:13px; }
  .iconbtn { border:none; background:none; cursor:pointer; color:#c4332b; font-size:14px; padding:2px 6px; }
  .qbtn { border:1px solid #cfd3db; background:#fff; border-radius:7px; width:30px; height:30px; font-size:16px; line-height:1; }
  .qty { width:64px; text-align:center; padding:7px; border:1px solid #cfd3db; border-radius:8px; font-size:14px; }

function qtyOf(prod){const m=String(prod).match(/(\d+)\s*kom/i);return m?(+m[1]||1):1;}
function tipOf(prod){const s=settings(),p=String(prod).toLowerCase();for(const it of s.proizvodi){if(it.tip&&p.includes(it.tip.toLowerCase()))return it;}return s.proizvodi[0];}

function parseCSV(t){const rows=[];let row=[],cur="",q=false;for(let i=0;i<t.length;i++){const c=t[i];
 if(q){if(c==='"'){if(t[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}
 else{if(c==='"')q=true;else if(c===','){row.push(cur);cur="";}else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur="";}else if(c==='\r'){}else cur+=c;}}
 if(cur!==""||row.length){row.push(cur);rows.push(row);}return rows;}
function extract(rows){
  rows=rows.map(r=>r.map(x=>(x||"").trim()));
  const orders=[],ads=[];
  let oi=rows.findIndex(r=>r.includes("Broj narudžbine"));
  if(oi>=0){const h=rows[oi],ix=n=>h.indexOf(n);
    const c={mesec:ix("Mesec"),br:ix("Br"),broj:ix("Broj narudžbine"),kupac:ix("Kupac"),prod:ix("Proizvod"),cena:ix("Cena (RSD)"),d1:ix("Datum naručeno"),d2:ix("Datum poslat kuriru"),d3:ix("Datum preuzeo kupac"),st:ix("Status")};
    for(let i=oi+1;i<rows.length;i++){const r=rows[i]; if(!r[c.br]||!/^\d+$/.test(r[c.br]))break;
      orders.push({mesec:r[c.mesec],br:+r[c.br],broj:r[c.broj],kupac:r[c.kupac],prod:r[c.prod],cena:num(r[c.cena]),d1:r[c.d1],d2:r[c.d2],d3:r[c.d3],status:r[c.st]});}}
  let ai=rows.findIndex(r=>r.includes("USD")&&r.includes("RSD"));
  if(ai>=0){const h=rows[ai],mi=h.indexOf("Mesec"),di=h.indexOf("Datum"),ui=h.indexOf("USD"),ri=h.indexOf("RSD");
    for(let i=ai+1;i<rows.length;i++){const r=rows[i]; if(!r[di]||!/^\d{2}\.\d{2}\.\d{4}$/.test(r[di]))break;

}

  document.querySelectorAll("[data-dec]").forEach(b=>b.onclick=()=>{const a=lsGet(LS_LAG,[]);a[+b.dataset.dec].kol=(parseFloat(a[+b.dataset.dec].kol)||0)-1;save(a);render();});
  document.querySelectorAll("[data-rem]").forEach(b=>b.onclick=()=>{if(!confirm("Obrisati stavku?"))return;const a=lsGet(LS_LAG,[]);a.splice(+b.dataset.rem,1);save(a);render();});
  document.getElementById("l_add").onclick=()=>{const naziv=val("l_naziv");if(!naziv)return;const a=lsGet(LS_LAG,[]);a.push({naziv,jed:val("l_jed")||"kom",kol:parseFloat(val("l_kol"))||0});save(a);render();};
}
function renderSettings(){
  const s=settings();
  const prod=s.proizvodi.map((p,i)=>`<tr><td><input class="inp" data-pt="${i}" value="${(p.tip||"").replace(/"/g,'&quot;')}" size="18"></td><td class="num"><input class="inp" data-pc="${i}" value="${p.cena}" size="7" inputmode="numeric"> RSD</td><td><button class="iconbtn" data-pr="${i}">✕</button></td></tr>`).join("");
  const komp=s.komponente.map((k,i)=>`<tr><td><input class="inp" data-kn="${i}" value="${(k.naziv||"").replace(/"/g,'&quot;')}" size="16"></td><td><input class="inp" data-kj="${i}" value="${k.jed||""}" size="5"></td><td class="num"><input class="inp" data-kc="${i}" value="${k.cena}" size="7" inputmode="numeric"> RSD</td><td><button class="iconbtn" data-kr="${i}">✕</button></td></tr>`).join("");
  document.getElementById("app").innerHTML=`
    <div class="panel" style="max-width:560px">
      <h2>Poštarina</h2>
      <div class="formrow"><div class="f"><label>Cena poštarine po porudžbini (RSD)</label><input class="inp" id="s_post" value="${s.postarina}" size="8" inputmode="numeric"></div><button class="btn primary" id="s_postsave">Sačuvaj</button></div>
      <div class="muted" style="font-size:11px">Profit = cena − poštarina − (cena izrade × broj komada). Računa se uživo.</div>
    </div>
    <div class="panel" style="max-width:560px">
      <h2>Cena izrade po proizvodu</h2>
      <div class="muted" style="font-size:11px;margin-bottom:8px">Naziv tipa mora da se pojavljuje u nazivu proizvoda (npr. „Lampa", „Držač", „Reklama").</div>
      <table><thead><tr><th>Tip proizvoda</th><th class="num">Cena izrade</th><th></th></tr></thead><tbody>${prod}</tbody></table>
      <div class="formrow" style="margin-top:10px"><div class="f"><label>Novi tip</label><input class="inp" id="p_tip" placeholder="npr. Držač" size="14"></div><div class="f"><label>Cena (RSD)</label><input class="inp" id="p_cena" placeholder="0" size="7" inputmode="numeric"></div><button class="btn primary" id="p_add">+ Dodaj</button></div>
    </div>
    <div class="panel" style="max-width:560px">
      <h2>Cenovnik komponenti (informativno)</h2>
      <div class="muted" style="font-size:11px;margin-bottom:8px">Beleži cenu po komponenti da znaš kad nešto poskupi (traka, kabl…).</div>
      <table><thead><tr><th>Komponenta</th><th>Jed.</th><th class="num">Cena</th><th></th></tr></thead><tbody>${komp}</tbody></table>
      <div class="formrow" style="margin-top:10px"><div class="f"><label>Nova komponenta</label><input class="inp" id="k_naziv" placeholder="npr. Prekidač" size="14"></div><div class="f"><label>Jed.</label><input class="inp" id="k_jed" placeholder="kom" size="5"></div><div class="f"><label>Cena</label><input class="inp" id="k_cena" placeholder="0" size="7" inputmode="numeric"></div><button class="btn primary" id="k_add">+ Dodaj</button></div>
    </div>`;
  document.getElementById("s_postsave").onclick=()=>{const v=num(val("s_post"));const x=settings();x.postarina=v;lsSet(LS_SET,x);render();};
  document.querySelectorAll("[data-pt]").forEach(inp=>inp.onchange=()=>{const x=settings();x.proizvodi[+inp.dataset.pt].tip=inp.value.trim();lsSet(LS_SET,x);});
  document.querySelectorAll("[data-pc]").forEach(inp=>inp.onchange=()=>{const x=settings();x.proizvodi[+inp.dataset.pc].cena=num(inp.value);lsSet(LS_SET,x);});
  document.querySelectorAll("[data-pr]").forEach(b=>b.onclick=()=>{const x=settings();x.proizvodi.splice(+b.dataset.pr,1);lsSet(LS_SET,x);render();});
  document.getElementById("p_add").onclick=()=>{const t=val("p_tip");if(!t)return;const x=settings();x.proizvodi.push({tip:t,cena:num(val("p_cena"))});lsSet(LS_SET,x);render();};
  document.querySelectorAll("[data-kn]").forEach(inp=>inp.onchange=()=>{const x=settings();x.komponente[+inp.dataset.kn].naziv=inp.value.trim();lsSet(LS_SET,x);});
  document.querySelectorAll("[data-kj]").forEach(inp=>inp.onchange=()=>{const x=settings();x.komponente[+inp.dataset.kj].jed=inp.value.trim();lsSet(LS_SET,x);});
  document.querySelectorAll("[data-kc]").forEach(inp=>inp.onchange=()=>{const x=settings();x.komponente[+inp.dataset.kc].cena=num(inp.value);lsSet(LS_SET,x);});
  document.querySelectorAll("[data-kr]").forEach(b=>b.onclick=()=>{const x=settings();x.komponente.splice(+b.dataset.kr,1);lsSet(LS_SET,x);render();});
  document.getElementById("k_add").onclick=()=>{const n=val("k_naziv");if(!n)return;const x=settings();x.komponente.push({naziv:n,jed:val("k_jed")||"kom",cena:num(val("k_cena"))});lsSet(LS_SET,x);render();};
}
function renderObrada(){
  const m=STATE.month;
  const ords=STATE.orders.filter(o=>o.mesec===m && o.status==="U obradi").sort((a,b)=>ts(b.d1)-ts(a.d1));
  const conf=lsGet(LS_CONF,{});
  const tally={};
  ords.forEach(o=>{const q=qtyOf(o.prod);o.prod.split("+").map(x=>x.trim()).forEach((p,idx)=>{let name=p.replace(/\s*\(.*?\)/g,"").trim();if(!name)return;tally[name]=(tally[name]||0)+(idx===0?q:1);});});
  const tallyHtml=Object.entries(tally).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f1f4;font-size:14px"><span>${k}</span><b style="font-size:16px">${v}</b></div>`).join("")||'<div class="muted">nema</div>';
  const confCount=ords.filter(o=>conf[o.broj]).length;
  const list=ords.map(o=>{const c=!!conf[o.broj];
    return `<tr style="${c?'background:#eafaf0':''}"><td><input type="checkbox" data-cf="${o.broj}" ${c?'checked':''} style="width:20px;height:20px"></td><td class="nowrap">${o.broj}</td><td>${o.kupac}</td><td class="col-proizvod">${o.prod}</td><td class="num">${o.cena.toLocaleString("sr-RS")}</td><td class="nowrap">${o.d1}</td></tr>`;}).join("");
  document.getElementById("app").innerHTML=`
    <div class="twocol">
      <div class="panel"><h2>Potvrda narudžbina — SMS (${confCount}/${ords.length} potvrđeno)</h2>
        <div class="muted" style="font-size:11px;margin-bottom:8px">Čekiraj kad ti kupac potvrdi porudžbinu preko SMS-a. Čuva se na ovom uređaju.</div>
        <div class="tableScroll"><table><thead><tr><th>✓</th><th>Narudžbina</th><th>Kupac</th><th class="col-proizvod">Proizvod</th><th class="num">Cena</th><th>Naručeno</th></tr></thead><tbody>${list||'<tr><td colspan="6" class="muted">nema u obradi</td></tr>'}</tbody></table></div>
      </div>
      <div class="panel"><h2>Za izradu (${ords.length} por.)</h2><div class="muted" style="font-size:11px;margin-bottom:8px">Koliko čega da napraviš za sve „U obradi".</div>${tallyHtml}</div>
    </div>`;
  document.querySelectorAll("[data-cf]").forEach(cb=>cb.onchange=()=>{const x=lsGet(LS_CONF,{});if(cb.checked)x[cb.dataset.cf]=true;else delete x[cb.dataset.cf];lsSet(LS_CONF,x);render();});
}
function render(){buildMonthSelect();tabsBar();if(STATE.tab==="pregled")renderPregled();else if(STATE.tab==="troskovi")renderTroskovi();else if(STATE.tab==="lager")renderLager();else renderSettings();}
function exportData(){const data={expenses:lsGet(LS_EXP,[]),lager:lsGet(LS_LAG,[]),settings:settings()};const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="3dm-backup.json";a.click();}
async function load(){
  localStorage.removeItem(LS_URL);
  document.getElementById("boot").classList.remove("hide");
  document.getElementById("boot").className="center";
  document.getElementById("boot").textContent="⏳ Učitavam…";
  let synced=false;
  try{ synced=await dbLoadAll(); }catch(e){}
  try{
    const r=extract(parseCSV(EMBEDDED_CSV));
    STATE.orders=r.orders; STATE.ads=r.ads;
    document.getElementById("boot").classList.add("hide");
    document.getElementById("sub").textContent=(synced?"☁ Sinhronizovano (baza)":"⚠ Bez baze (lokalno)")+" • profit iz Podešavanja • narudžbine 21.06.2026";
    render();
  }catch(e){document.getElementById("boot").className="center err";document.getElementById("boot").textContent="Greška: "+e.message;}
}
document.getElementById("month").onchange=e=>{STATE.month=e.target.value;STATE.statusFilter=null;render();};
document.getElementById("refresh").onclick=()=>location.reload(true);
document.getElementById("settings").onclick=exportData;
load();
</script>
</body>
